<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Data Anak</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Icon -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<style>
body { background: #F6FAF8; font-family: 'Segoe UI', sans-serif; }
.header { background: linear-gradient(135deg, #6FCF97, #56CCF2); padding: 25px 20px; color: white; border-radius: 0 0 30px 30px; }
.card-pro { background: white; border-radius: 20px; padding: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); margin-bottom: 15px; }
.table thead { background: #6FCF97; color: white; }
.table-hover tbody tr:hover { background: #E8F8F1; transition: 0.2s; }
.search-box { border-radius: 12px; }
.bottom-nav { position: fixed; bottom: 0; width: 100%; background: white; border-radius: 20px 20px 0 0; box-shadow: 0 -5px 20px rgba(0,0,0,0.08); }
.nav-item { text-align: center; font-size: 12px; color: #aaa; cursor: pointer; transition: 0.3s; }
.nav-item:hover { color: #6FCF97; transform: scale(1.1); }
.nav-item.active { color: #6FCF97; }
.safe { height: 80px; }
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
    <h5><i class="bi bi-bar-chart"></i> Data Monitoring Anak</h5>
    <small>Riwayat Pengukuran Tinggi Badan & Gizi</small>
</div>

<div class="container mt-3">

    <!-- SEARCH -->
    <div class="card-pro">
        <input type="text" id="search" class="form-control search-box" placeholder="🔍 Cari nama anak...">
    </div>

    <!-- TABLE -->
    <div class="card-pro">
        <div class="table-responsive">
            <table class="table table-bordered table-hover align-middle text-center">
                <thead>
                    <tr>
                        <th>No</th>
                        <th>Nama</th>
                        <th>Tgl Lahir</th>
                        <th>Umur</th>
                        <th>Tinggi Badan</th>
                        <th>Button Dipilih</th>
                        <th>Waktu</th>
                    </tr>
                </thead>
                <tbody id="tableData"></tbody>
            </table>
            <div class="d-flex justify-content-end mt-3">
                <button class="btn btn-success px-4 py-2 shadow-sm" onclick="downloadPDF()">
                    <i class="bi bi-file-earmark-pdf"></i> Download PDF
                </button>
            </div>
        </div>
    </div>

</div>

<div class="safe"></div>

<!-- NAV -->
<div class="bottom-nav py-2">
    <div class="d-flex justify-content-around">
        <div class="nav-item" onclick="goHome()">
            <i class="bi bi-house fs-5"></i><br>Home
        </div>
        <div class="nav-item active">
            <i class="bi bi-bar-chart fs-5"></i><br>Data
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<script>
// ================= SUPABASE =================
const SUPABASE_URL = "https://unipgrkundayjaudznjn.supabase.co";
const SUPABASE_KEY = "sb_publishable_oV3aBukpqULi2fhILB8BpQ_h09lm8bQ";

// ================= HITUNG UMUR =================
function hitungUmur(tanggal){
    let lahir = new Date(tanggal);
    let sekarang = new Date();
    return sekarang.getFullYear() - lahir.getFullYear();
}

// ================= FETCH HISTORY =================
async function fetchHistory(){
    try{
        const res = await fetch(
            `${SUPABASE_URL}/rest/v1/history_gizi?select=*,anak(*)&order=created_at.desc`,
            {
                headers: {
                    "apikey": SUPABASE_KEY,
                    "Authorization": "Bearer " + SUPABASE_KEY
                }
            }
        );

        const data = await res.json();

        let table = document.getElementById("tableData");
        table.innerHTML = "";

        data.forEach((d,i)=>{
            let anak = d.anak?.[0];

            let nama = anak ? anak.nama : d.nama;
            let tgl = anak ? anak.tanggal_lahir : "-";
            let umur = anak ? hitungUmur(anak.tanggal_lahir) + " Tahun" : "-";
            let gizi = d.tombol_a ? "Gizi A" : "Gizi B";

            table.innerHTML += `
<tr>
    <td>${i+1}</td>
    <td>${d.nama}</td>
    <td>${d.tanggal_lahir || '-'}</td>
    <td>${d.umur ? d.umur + ' Tahun' : '-'}</td>
    <td>${d.tinggi} cm</td>
    <td>${d.tombol_a ? 'Gizi A' : 'Gizi B'}</td>
    <td>${new Date(d.created_at).toLocaleString()}</td>
</tr>`;
        });

    } catch(err){
        console.error("Error fetch history:", err);
    }
}

// SEARCH
document.getElementById("search").addEventListener("keyup", function(){
    let keyword = this.value.toLowerCase();
    let rows = document.querySelectorAll("#tableData tr");
    rows.forEach(row=>{
        row.style.display = row.innerText.toLowerCase().includes(keyword) ? "" : "none";
    });
});

// NAV
function goHome(){ window.location.href = "index.html"; }

// PDF
function downloadPDF(){
    const element = document.querySelector(".table-responsive");

    let opt = {
        margin: 0.5,
        filename: 'history-gizi.pdf',
        image: { type: 'jpeg', quality: 0.98 },
        html2canvas: { scale: 2 },
        jsPDF: { unit: 'cm', format: 'a4', orientation: 'portrait' }
    };

    html2pdf().set(opt).from(element).save();
}

// fetch history saat load
fetchHistory();

</script>
</body>
</html>
