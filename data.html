<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Data Anak</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<style>
body { background: #F6FAF8; font-family: 'Segoe UI', sans-serif; }
.header { background: linear-gradient(135deg, #6FCF97, #56CCF2); padding: 25px 20px; color: white; border-radius: 0 0 30px 30px; }
.card-pro { background: white; border-radius: 20px; padding: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); margin-bottom: 15px; }
.table thead { background: #6FCF97; color: white; }
.table-hover tbody tr:hover { background: #E8F8F1; transition: 0.2s; }
.search-box { border-radius: 12px; }
.bottom-nav { position: fixed; bottom: 0; width: 100%; background: white; border-radius: 20px 20px 0 0; box-shadow: 0 -5px 20px rgba(0,0,0,0.08); }
.nav-item { text-align: center; font-size: 12px; color: #aaa; cursor: pointer; transition: 0.3s; }
.nav-item:hover { color: #6FCF97; transform: scale(1.1); }
.nav-item.active { color: #6FCF97; }
.safe { height: 80px; }

/* 🔥 DOWNLOAD BUTTON MODERN */
.download-wrapper {
    display: flex;
    justify-content: flex-end;
    margin-top: 10px;
}

.dropdown-download {
    position: relative;
}

.btn-download {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 18px;
    background: linear-gradient(135deg, #28a745, #20c997);
    color: white;
    border: none;
    cursor: pointer;
    border-radius: 25px;
    font-weight: 500;
    box-shadow: 0 4px 10px rgba(0,0,0,0.15);
    transition: 0.3s;
}

.btn-download:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 14px rgba(0,0,0,0.2);
}

/* DROPDOWN MODERN */
.menu-dropdown {
    position: absolute;
    right: 0;
    top: 110%;
    background: white;
    border-radius: 12px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.15);
    overflow: hidden;
    min-width: 180px;

    opacity: 0;
    transform: translateY(10px);
    pointer-events: none;
    transition: all 0.25s ease;
}

.menu-dropdown.show {
    opacity: 1;
    transform: translateY(0);
    pointer-events: auto;
}

.menu-dropdown button {
    width: 100%;
    padding: 12px 15px;
    border: none;
    background: white;
    text-align: left;
    cursor: pointer;
    font-size: 14px;
    transition: 0.2s;
}

.menu-dropdown button:hover {
    background: #f5f5f5;
    padding-left: 20px;
}
</style>
</head>

<body>

<div class="header">
    <h5><i class="bi bi-bar-chart"></i> Data Monitoring Anak</h5>
    <small>Riwayat Pengukuran Tinggi Badan & Gizi</small>
</div>

<div class="container mt-3">

    <div class="card-pro">
        <input type="text" id="search" class="form-control search-box" placeholder="🔍 Cari nama anak...">
    </div>

    <div class="card-pro">
        <div class="table-responsive">
            <table class="table table-bordered table-hover align-middle text-center">
                <thead>
                    <tr>
    <th>No</th>
    <th>Nama</th>
    <th>Tgl Lahir</th>
    <th>Umur</th>
    <th>Tinggi Badan</th>
    <th>Button Dipilih</th>
    <th>Waktu</th>
    <th>Aksi</th>

                    </tr>
                </thead>
                <tbody id="tableData"></tbody>
            </table>

            <!-- 🔥 DOWNLOAD BUTTON (KANAN + SVG) -->
            <div class="download-wrapper">
                <div class="dropdown-download">
                    <button onclick="toggleMenu()" class="btn-download">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="white" viewBox="0 0 24 24">
                            <path d="M12 16l4-5h-3V4h-2v7H8l4 5z"/>
                            <path d="M20 18H4v2h16v-2z"/>
                        </svg>
                        Download
                    </button>

                    <div id="menuDownload" class="menu-dropdown">
                        <button onclick="downloadPDF()">📄 Download PDF</button>
                        <button onclick="downloadExcel()">📊 Download Excel</button>
                    </div>
                </div>
            </div>

        </div>
    </div>

</div>

<div class="safe"></div>

<div class="bottom-nav py-2">
    <div class="d-flex justify-content-around">
        <div class="nav-item" onclick="goHome()">
            <i class="bi bi-house fs-5"></i><br>Home
        </div>
        <div class="nav-item active">
            <i class="bi bi-bar-chart fs-5"></i><br>Data
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<script>
const SUPABASE_URL = "https://unipgrkundayjaudznjn.supabase.co";
const SUPABASE_KEY = "sb_publishable_oV3aBukpqULi2fhILB8BpQ_h09lm8bQ";

function hitungUmur(tanggal){
    let lahir = new Date(tanggal);
    let sekarang = new Date();
    return sekarang.getFullYear() - lahir.getFullYear();
}

async function fetchHistory(){
    try{
        const res = await fetch(
            `${SUPABASE_URL}/rest/v1/history_gizi?select=*,anak(*)&order=created_at.desc`,
            {
                headers: {
                    "apikey": SUPABASE_KEY,
                    "Authorization": "Bearer " + SUPABASE_KEY
                }
            }
        );

        const data = await res.json();
        // simpan semua data untuk search
        window.historyData = data;

        // tampilkan 20 data pertama di tabel
        renderTable(data.slice(0, 20));

    } catch(err){
        console.error("Error fetch history:", err);
    }
}

// render table dari data yang diberikan
function renderTable(data){
    let table = document.getElementById("tableData");
    table.innerHTML = "";

    data.forEach((d,i)=>{
        const tglLahir = d.anak?.tanggal_lahir || '-';
        const umur = tglLahir !== '-' ? hitungUmur(tglLahir) : '-';

        table.innerHTML += `
<tr>
<td>${i+1}</td>
<td>${d.anak?.nama || '-'}</td>
<td>${tglLahir}</td>
<td>${umur !== '-' ? umur + ' Tahun' : '-'}</td>
<td>${d.tinggi || '-'} cm</td>
<td>${d.tombol_a ? 'Gizi A' : 'Gizi B'}</td>
<td>${new Date(d.created_at).toLocaleString()}</td>
<td>
    <button class="btn btn-sm btn-danger" onclick="hapusData('${d.id}')">
        <i class="bi bi-trash"></i> Hapus
    </button>
</td>
</tr>`;
    });
}

async function hapusData(id){
    if(!confirm("Apakah kamu yakin ingin menghapus data ini?")) return;

    try {
        const res = await fetch(`${SUPABASE_URL}/rest/v1/history_gizi?id=eq.${id}`, {
            method: 'DELETE',
            headers: {
                'apikey': SUPABASE_KEY,
                'Authorization': 'Bearer ' + SUPABASE_KEY,
                'Content-Type': 'application/json'
            }
        });

        if(res.ok){
            alert("Data berhasil dihapus!");
            fetchHistory(); // refresh tabel
        } else {
            alert("Gagal menghapus data.");
            console.error(await res.text());
        }
    } catch(err){
        console.error("Error hapus data:", err);
    }
}

// search
document.getElementById("search").addEventListener("keyup", function(){
    let keyword = this.value.toLowerCase();

    let filtered = window.historyData.filter(d=>{
        const nama = d.anak?.nama?.toLowerCase() || '';
        const tgl = d.anak?.tanggal_lahir?.toLowerCase() || '';
        const umur = d.anak?.tanggal_lahir ? hitungUmur(d.anak.tanggal_lahir).toString() : '';

        return nama.includes(keyword) || tgl.includes(keyword) || ortu.includes(keyword) || umur.includes(keyword);
    });

    // tampilkan maksimal 20 hasil search
    renderTable(filtered.slice(0, 20));
});

function goHome(){ window.location.href = "index.html"; }

// 🔥 TOGGLE MODERN
function toggleMenu() {
    const menu = document.getElementById("menuDownload");
    menu.classList.toggle("show");
}

// AUTO CLOSE
window.addEventListener("click", function(e) {
    if (!e.target.closest(".dropdown-download")) {
        document.getElementById("menuDownload").classList.remove("show");
    }
});

function downloadPDF(){
    const element = document.querySelector(".table-responsive");

    let opt = {
        margin: 0.5,
        filename: 'history-gizi.pdf',
        image: { type: 'jpeg', quality: 0.98 },
        html2canvas: { scale: 2 },
        jsPDF: { unit: 'cm', format: 'a4', orientation: 'portrait' }
    };

    html2pdf().set(opt).from(element).save();
}

function downloadExcel(){
    let table = document.querySelector(".table-responsive table");
    let html = table.outerHTML;

    let url = 'data:application/vnd.ms-excel,' + encodeURIComponent(html);
    let link = document.createElement("a");

    link.href = url;
    link.download = "history-gizi.xls";
    link.click();
}

fetchHistory();
</script>
</body>
</html>
