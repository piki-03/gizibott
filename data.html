<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Data Anak</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Icon -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<style>
body {
    background: #F6FAF8;
    font-family: 'Segoe UI', sans-serif;
}

/* HEADER */
.header {
    background: linear-gradient(135deg, #6FCF97, #56CCF2);
    padding: 25px 20px;
    color: white;
    border-radius: 0 0 30px 30px;
}

/* CARD */
.card-pro {
    background: white;
    border-radius: 20px;
    padding: 15px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.05);
    margin-bottom: 15px;
}

/* TABLE */
.table thead {
    background: #6FCF97;
    color: white;
}

.table-hover tbody tr:hover {
    background: #E8F8F1;
    transition: 0.2s;
}

/* SEARCH */
.search-box {
    border-radius: 12px;
}

/* NAV */
.bottom-nav {
    position: fixed;
    bottom: 0;
    width: 100%;
    background: white;
    border-radius: 20px 20px 0 0;
    box-shadow: 0 -5px 20px rgba(0,0,0,0.08);
}

.nav-item {
    text-align: center;
    font-size: 12px;
    color: #aaa;
    cursor: pointer;
    transition: 0.3s;
}

/* HOVER ICON */
.nav-item:hover {
    color: #6FCF97;
    transform: scale(1.1);
}

.nav-item.active {
    color: #6FCF97;
}

/* SAFE */
.safe {
    height: 80px;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
    <h5><i class="bi bi-bar-chart"></i> Data Monitoring Anak</h5>
    <small>Riwayat Pengukuran Tinggi Badan</small>
</div>

<div class="container mt-3">

    <!-- SEARCH -->
    <div class="card-pro">
        <input type="text" id="search" class="form-control search-box" placeholder="🔍 Cari nama anak...">
    
    </div>

    <!-- TABLE -->
    <div class="card-pro">
        <div class="table-responsive">
            <table class="table table-bordered table-hover align-middle text-center">
                <thead>
                    <tr>
                        <th>No</th>
                        <th>Nama</th>
                        <th>Tgl Lahir</th>
                        <th>Umur</th>
                        <th>Tinggi Badan</th>
                        <th>Button Dipilih</th>
                    </tr>
                </thead>

                <tbody id="tableData"></tbody>
            </table>
            <div class="d-flex justify-content-end mt-3">
    <button class="btn btn-success px-4 py-2 shadow-sm" onclick="downloadPDF()">
        <i class="bi bi-file-earmark-pdf"></i> Download PDF
    </button>
</div>
        </div>
    </div>

</div>

<div class="safe"></div>

<!-- NAV -->
<div class="bottom-nav py-2">
    <div class="d-flex justify-content-around">
        <div class="nav-item" onclick="goHome()">
            <i class="bi bi-house fs-5"></i><br>Home
        </div>
        <div class="nav-item active">
            <i class="bi bi-bar-chart fs-5"></i><br>Data
        </div>
    </div>
</div>

<script>
// DATA SIMULASI
let dataAnak = [
    {nama:"Vicky", tgl:"2020-05-01", umur:"4 Tahun", tinggi:120, gizi:"A"},
    {nama:"Budi", tgl:"2021-02-10", umur:"3 Tahun", tinggi:95, gizi:"B"},
    {nama:"Siti", tgl:"2022-01-15", umur:"2 Tahun", tinggi:85, gizi:"B"},
    {nama:"Andi", tgl:"2020-09-20", umur:"4 Tahun", tinggi:110, gizi:"A"},
];

// BADGE GIZI
function getGizi(g){
    if(g === "A") return '<span class="badge bg-success">Gizi A</span>';
    return '<span class="badge bg-primary">Gizi B</span>';
}

// RENDER TABLE
function renderTable(data){
    let table = document.getElementById("tableData");
    table.innerHTML = "";

    data.forEach((d,i)=>{
        table.innerHTML += `
        <tr>
            <td>${i+1}</td>
            <td>${d.nama}</td>
            <td>${d.tgl}</td>
            <td>${d.umur}</td>
            <td>${d.tinggi} cm</td>
            <td>${getGizi(d.gizi)}</td>
        </tr>
        `;
    });
}

renderTable(dataAnak);

// SEARCH
document.getElementById("search").addEventListener("keyup", function(){
    let keyword = this.value.toLowerCase();
    let filter = dataAnak.filter(d => d.nama.toLowerCase().includes(keyword));
    renderTable(filter);
});

// NAVIGASI
function goHome(){
    window.location.href = "index.html";
}
</script>

</body>
</html>
