<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nutrition Monitor Pro</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Icons -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<!-- CSS -->
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- HEADER -->
<div class="header">
    <h5><i class="bi bi-heart-pulse-fill"></i> Nutrition Monitor</h5>
    <div class="subtext">Smart IoT Health System</div>
</div>

<div class="container mt-3">

    <!-- PROFILE -->
    <div class="card-pro d-flex align-items-center profile">
        <img src="https://cdn-icons-png.flaticon.com/512/4140/4140048.png">
        <div class="ms-3">
            <b>Vicky</b><br>
            <small>4 Tahun • Jakarta</small><br>
            <small class="text-muted">UID: 123ABC456</small>
        </div>
    </div>

    <!-- HEIGHT -->
  <div class="card-pro height-box">
    
    <b class="mb-2 d-block">📏 Pengukuran Tinggi Badan</b>

    <div class="height-value" id="tinggi">120 cm</div>

    <div class="progress mt-2">
        <div class="progress-bar" id="bar"></div>
    </div>

</div>

    <!-- MENU GIZI -->
    <div class="card-pro">
        <b class="mb-2 d-block">🍽️ Pilih Program Gizi</b>

        <div class="row g-3 mt-1">
            
         <div class="col-6">
    <div class="menu-btn gizi-a" onclick="kirimGizi('A', event)">
        <i class="bi bi-egg-fried fs-3"></i>
        <div>Gizi A</div>
        <small>Standar</small>
    </div>
</div>

<div class="col-6">
    <div class="menu-btn gizi-b" onclick="kirimGizi('B', event)">
        <i class="bi bi-capsule fs-3"></i>
        <div>Gizi B</div>
        <small>Intensif</small>
    </div>
</div>

        </div>
    </div>

</div>

<div class="safe"></div>

<!-- NAV -->
<div class="bottom-nav py-2">
    <div class="d-flex justify-content-around">
        <div class="nav-item active">
            <i class="bi bi-house fs-5"></i><br>Home
        </div>
        <div class="nav-item" onclick="goTodata()">
            <i class="bi bi-bar-chart fs-5"></i><br>Data
        </div>
    </div>
</div>

<!-- JS -->
<script src="script.js"></script>

</body>
</html>
